name: Generate Bounties Index

on:
  schedule:
    - cron: '0 */6 * * *'
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  issues: read

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # Fix #7: main is a protected branch (required PR + BCOS status checks).
          #   The default github-actions[bot] token cannot direct-push, so the
          #   auto-commit was rejected (GH006 protected branch hook declined).
          #   Persist an admin PAT (secret BOUNTY_PUSH_TOKEN) so the auto-commit
          #   push bypasses protection (repo has enforce_admins: false). Falls
          #   back to GITHUB_TOKEN if the secret is unset (commit will still be
          #   blocked until the PAT is added).
          token: ${{ secrets.BOUNTY_PUSH_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Generate bounties.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${{ github.repository }}"
          echo "Fetching open bounties from $REPO..."

          # Fix #2: --paginate to handle repos with >100 issues
          # Fix #3: select(has("pull_request") | not) to exclude PRs
          # Fix #4: -X GET — gh api defaults to POST when -f fields are present,
          #   which was POSTing to /issues (create) -> 422 "title wasn't supplied".
          # Fix #5: with --paginate, gh applies --jq PER PAGE, producing one array
          #   per page (25 pages @ 2400+ issues) -> invalid combined JSON for
          #   --argjson. So fetch raw pages and merge with `jq -s 'add'` once.
          # Fix #6: pipe the bounties array into the wrapper jq instead of
          #   passing it via --argjson. At 1800+ bounties (~750KB) the command
          #   line exceeded ARG_MAX ("jq: Argument list too long", exit 126).
          timestamp=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          gh api --paginate -X GET "repos/$REPO/issues" \
            -f state=open \
            -f per_page=100 \
            -f sort=created \
            -f direction=desc \
            | jq -s '
              add |
              map(select(has("pull_request") | not)) |
              map(select(
                (.title | test("(?i)bounty|BOUNTY")) or
                (.labels[]?.name | test("(?i)bounty"))
              )) |
              map({
                id: .number,
                title: .title,
                url: .html_url,
                state: .state,
                created_at: .created_at,
                updated_at: .updated_at,
                comments: .comments,
                author: .user.login,
                labels: [.labels[]?.name | select(test("(?i)bounty|open|major|standard|help wanted|integration|community|easy|documentation|red-team"))],
                agents_welcome: ((.body // "") | test("(?i)agents.?welcome|Agents.?welcome"))
              })
            ' \
            | jq --arg updated "$timestamp" --arg repo "$REPO" '{
                updated_at: $updated,
                repo: $repo,
                total: length,
                bounties: .
              }' > bounties.json

          count=$(jq '.total' bounties.json)
          echo "Generated bounties.json with $count bounties"

      - name: Commit bounties.json
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: 'chore: update bounties.json [skip ci]'
          file_pattern: 'bounties.json'
          skip_checkout: true
