<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1600" role="img" aria-labelledby="title desc">
  <title id="title">RustChain Proof-of-Antiquity explainer</title>
  <desc id="desc">An original infographic explaining RustChain Proof-of-Antiquity, one CPU one vote, six hardware fingerprint checks, VM exclusion, and the pip install clawrtc starting point.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#101722"/>
      <stop offset="52%" stop-color="#192434"/>
      <stop offset="100%" stop-color="#251c18"/>
    </linearGradient>
    <linearGradient id="rust" x1="0" x2="1">
      <stop offset="0%" stop-color="#ff9c55"/>
      <stop offset="100%" stop-color="#d45a2a"/>
    </linearGradient>
    <linearGradient id="green" x1="0" x2="1">
      <stop offset="0%" stop-color="#6ee7b7"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <style>
      .title { font: 700 58px Inter, Arial, sans-serif; fill: #f8fafc; }
      .subtitle { font: 400 25px Inter, Arial, sans-serif; fill: #cbd5e1; }
      .section { font: 700 28px Inter, Arial, sans-serif; fill: #f8fafc; }
      .label { font: 700 23px Inter, Arial, sans-serif; fill: #f8fafc; }
      .body { font: 400 21px Inter, Arial, sans-serif; fill: #dbe4ef; }
      .small { font: 400 18px Inter, Arial, sans-serif; fill: #a8b3c3; }
      .mono { font: 700 22px "Courier New", monospace; fill: #0f172a; }
      .chip { fill: #0f172a; stroke: #334155; stroke-width: 2; }
      .card { fill: #172033; stroke: #324159; stroke-width: 2; filter: url(#shadow); }
      .muted-card { fill: #111827; stroke: #344255; stroke-width: 2; }
      .orange { fill: url(#rust); }
      .green { fill: url(#green); }
      .line { stroke: #64748b; stroke-width: 5; stroke-linecap: round; }
      .dash { stroke: #64748b; stroke-width: 4; stroke-dasharray: 10 12; stroke-linecap: round; }
    </style>
  </defs>

  <rect width="1200" height="1600" fill="url(#bg)"/>
  <path d="M0 142 C178 85 284 172 444 116 C655 42 772 184 986 96 C1071 61 1134 52 1200 55 L1200 0 L0 0 Z" fill="#243247" opacity="0.75"/>
  <path d="M0 1518 C158 1444 305 1544 478 1497 C696 1437 820 1527 1008 1468 C1088 1443 1142 1442 1200 1450 L1200 1600 L0 1600 Z" fill="#351f18" opacity="0.65"/>

  <text x="80" y="112" class="title">Proof-of-Antiquity</text>
  <text x="82" y="152" class="subtitle">RustChain rewards real, unique hardware instead of raw hash-rate arms races.</text>

  <rect x="80" y="205" width="1040" height="160" rx="28" class="card"/>
  <circle cx="170" cy="285" r="50" class="orange"/>
  <text x="170" y="276" text-anchor="middle" class="mono">1</text>
  <text x="170" y="304" text-anchor="middle" class="mono">CPU</text>
  <text x="250" y="263" class="section">One physical CPU gets one vote</text>
  <text x="250" y="302" class="body">Votes are weighted by attested hardware antiquity and uniqueness.</text>
  <text x="250" y="333" class="small">The network favors preservation value over warehouse-scale modern compute.</text>

  <line x1="600" y1="385" x2="600" y2="450" class="line"/>
  <polygon points="600,472 582,442 618,442" fill="#64748b"/>

  <rect x="80" y="485" width="1040" height="420" rx="28" class="card"/>
  <text x="120" y="545" class="section">The miner proves it is real hardware</text>
  <text x="120" y="584" class="body">A fresh nonce prevents replay, then a rotating 4-of-6 fingerprint checks the machine.</text>

  <g transform="translate(120,625)">
    <rect width="295" height="82" rx="18" class="muted-card"/>
    <circle cx="40" cy="41" r="22" fill="#38bdf8"/>
    <text x="40" y="49" text-anchor="middle" class="mono">1</text>
    <text x="80" y="34" class="label">clock_drift</text>
    <text x="80" y="62" class="small">oscillator skew</text>
  </g>
  <g transform="translate(452,625)">
    <rect width="295" height="82" rx="18" class="muted-card"/>
    <circle cx="40" cy="41" r="22" fill="#38bdf8"/>
    <text x="40" y="49" text-anchor="middle" class="mono">2</text>
    <text x="80" y="34" class="label">cache_timing</text>
    <text x="80" y="62" class="small">latency geometry</text>
  </g>
  <g transform="translate(785,625)">
    <rect width="295" height="82" rx="18" class="muted-card"/>
    <circle cx="40" cy="41" r="22" fill="#38bdf8"/>
    <text x="40" y="49" text-anchor="middle" class="mono">3</text>
    <text x="80" y="34" class="label">simd_bias</text>
    <text x="80" y="62" class="small">silicon-specific SIMD</text>
  </g>
  <g transform="translate(120,735)">
    <rect width="295" height="82" rx="18" class="muted-card"/>
    <circle cx="40" cy="41" r="22" fill="#f59e0b"/>
    <text x="40" y="49" text-anchor="middle" class="mono">4</text>
    <text x="80" y="34" class="label">thermal_drift</text>
    <text x="80" y="62" class="small">heat changes timing</text>
  </g>
  <g transform="translate(452,735)">
    <rect width="295" height="82" rx="18" class="muted-card"/>
    <circle cx="40" cy="41" r="22" fill="#f59e0b"/>
    <text x="40" y="49" text-anchor="middle" class="mono">5</text>
    <text x="80" y="34" class="label">instruction_jitter</text>
    <text x="80" y="62" class="small">micro-variation</text>
  </g>
  <g transform="translate(785,735)">
    <rect width="295" height="82" rx="18" class="muted-card"/>
    <circle cx="40" cy="41" r="22" fill="#f43f5e"/>
    <text x="40" y="49" text-anchor="middle" class="mono">6</text>
    <text x="80" y="34" class="label">anti_emulation</text>
    <text x="80" y="62" class="small">VM and hypervisor scan</text>
  </g>
  <rect x="120" y="842" width="960" height="36" rx="18" fill="#0f172a" stroke="#334155"/>
  <text x="600" y="866" text-anchor="middle" class="small">Bonus context: serial and MAC consistency help prove physical presence.</text>

  <line x1="600" y1="925" x2="600" y2="990" class="line"/>
  <polygon points="600,1012 582,982 618,982" fill="#64748b"/>

  <rect x="80" y="1025" width="500" height="330" rx="28" class="card"/>
  <text x="120" y="1085" class="section">Real vintage hardware</text>
  <text x="120" y="1124" class="body">Passes the fingerprint checks.</text>
  <text x="120" y="1160" class="body">Receives one CPU vote with an</text>
  <text x="120" y="1192" class="body">antiquity multiplier.</text>
  <rect x="120" y="1230" width="380" height="74" rx="20" class="green"/>
  <text x="310" y="1276" text-anchor="middle" class="mono">2.5x to 4.0x possible</text>
  <text x="120" y="1325" class="small">Examples: 386, 486, PowerPC G4, 68K.</text>

  <rect x="620" y="1025" width="500" height="330" rx="28" class="card"/>
  <text x="660" y="1085" class="section">VMs and emulators</text>
  <text x="660" y="1124" class="body">Fail the physical fingerprint.</text>
  <text x="660" y="1160" class="body">They can run code, but do not prove</text>
  <text x="660" y="1192" class="body">a preserved machine exists.</text>
  <rect x="660" y="1230" width="380" height="74" rx="20" fill="#f43f5e"/>
  <text x="850" y="1276" text-anchor="middle" class="mono">0x or near-zero weight</text>
  <text x="660" y="1325" class="small">This is the anti-farm, anti-spoof layer.</text>

  <line x1="600" y1="1375" x2="600" y2="1418" class="dash"/>
  <rect x="200" y="1435" width="800" height="88" rx="26" fill="#f8fafc" filter="url(#shadow)"/>
  <text x="600" y="1489" text-anchor="middle" class="mono">Start: pip install clawrtc</text>
  <text x="600" y="1560" text-anchor="middle" class="small">Original explainer for RustChain bounty #13954 - clear enough for a smart newcomer in under 60 seconds.</text>
</svg>
